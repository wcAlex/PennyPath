{# User menu dropdown partial — anchored to top-right header icon. Hidden by default. #}
<style>
  #user-menu-wrapper {
    position: relative;
    display: inline-block;
  }

  #user-menu-toggle {
    background: transparent;
    border: 1px solid #2d2f4a;
    color: #cbd5e1;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  #user-menu-toggle:hover {
    background: #2d2f4a;
    color: white;
  }

  #user-menu-dropdown {
    display: none;
    position: absolute;
    top: 42px;
    right: 0;
    background: white;
    border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    min-width: 240px;
    z-index: 200;
    padding: 6px 0;
    color: #1a1a2e;
    overflow: hidden;
  }
  #user-menu-dropdown.open { display: block; }

  #user-menu-dropdown a,
  #user-menu-dropdown .menu-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 14px;
    font-size: 13px;
    color: #1a1a2e;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.12s;
  }
  #user-menu-dropdown a:hover,
  #user-menu-dropdown .menu-item:hover { background: #f3f4f6; }

  #user-menu-dropdown .menu-item.disabled {
    color: #9ca3af;
    cursor: not-allowed;
  }
  #user-menu-dropdown .menu-item.disabled:hover { background: white; }

  #user-menu-dropdown .menu-separator {
    height: 1px;
    background: #e5e7eb;
    margin: 6px 0;
  }

  #user-menu-dropdown .badge-soon {
    font-size: 10px;
    color: #6b7280;
    background: #f3f4f6;
    border-radius: 10px;
    padding: 2px 8px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 600;
  }
</style>

<div id="user-menu-wrapper">
  <button id="user-menu-toggle" type="button" aria-label="User menu" title="Account & settings"
          onclick="toggleUserMenu(event)">👤</button>

  <div id="user-menu-dropdown" role="menu" aria-label="User menu">
    <a href="/settings/profile" role="menuitem">Profile</a>
    <a href="/settings/goal" role="menuitem">Goal</a>
    <div class="menu-item disabled" role="menuitem" aria-disabled="true">
      <span>Linked accounts</span><span class="badge-soon">Soon</span>
    </div>
    <div class="menu-item disabled" role="menuitem" aria-disabled="true">
      <span>Bank statements</span><span class="badge-soon">Soon</span>
    </div>
    <div class="menu-item disabled" role="menuitem" aria-disabled="true">
      <span>Plaid permissions</span><span class="badge-soon">Soon</span>
    </div>
    <div class="menu-separator"></div>
    <div class="menu-item disabled" role="menuitem" aria-disabled="true">
      <span>Sign out</span><span class="badge-soon">Soon</span>
    </div>
  </div>
</div>

<script>
  function toggleUserMenu(ev) {
    if (ev) ev.stopPropagation();
    const el = document.getElementById('user-menu-dropdown');
    if (!el) return;
    el.classList.toggle('open');
  }

  // Close dropdown when clicking elsewhere
  document.addEventListener('click', function(ev) {
    const wrapper = document.getElementById('user-menu-wrapper');
    const dropdown = document.getElementById('user-menu-dropdown');
    if (!wrapper || !dropdown) return;
    if (!wrapper.contains(ev.target)) {
      dropdown.classList.remove('open');
    }
  });
</script>
